name: Build Windows Executable

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      run: |
        git clone https://github.com/${{ github.repository }}.git .
        git checkout ${{ github.sha }}

    - name: 设置Python环境
      run: |
        python --version

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt-Fluent-Widgets -i https://pypi.org/simple/
        pip install pyshp
        pip install pypinyin
        pip install pyproj
        pip install "geopandas==1.0.1" "pyogrio==0.10.0"

    - name: 打包应用
      run: |
        pyinstaller ConvertMapGIS.spec

    - name: 压缩dist目录为zip
      run: |
        powershell Compress-Archive -Path dist/* -DestinationPath ConvertMapGIS-${{ github.ref_name }}.zip

    - name: 发布到GitHub Release
      run: |
        $tag = "${{ github.ref_name }}"
        $zipFile = "ConvertMapGIS-${tag}.zip"
        $repoApi = "https://api.github.com/repos/${{ github.repository }}"
        $headers = @{
          "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
          "Accept"        = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        # 创建 Release（如果已存在则忽略错误）
        $releaseBody = @{
          tag_name = $tag
          name     = $tag
          draft    = $false
          prerelease = $false
        } | ConvertTo-Json
        try {
          $release = Invoke-RestMethod -Uri "$repoApi/releases" -Method Post `
            -Headers $headers -Body $releaseBody -ContentType "application/json"
        } catch {
          # Release 已存在，查询它
          $release = Invoke-RestMethod -Uri "$repoApi/releases/tags/$tag" `
            -Headers $headers
        }

        # 上传 zip 资产
        $uploadUrl = $release.upload_url -replace '\{.*\}', ''
        $uploadUrl = "${uploadUrl}?name=${zipFile}"
        $fileBytes = [System.IO.File]::ReadAllBytes($zipFile)
        Invoke-RestMethod -Uri $uploadUrl -Method Post `
          -Headers $headers -Body $fileBytes `
          -ContentType "application/octet-stream"
      shell: powershell
